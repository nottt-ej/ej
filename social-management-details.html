<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Management</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:linear-gradient(to right,#00264d,#990000);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1{
  margin:20px 0;
}

/* PACKAGES */
.packages{
  width:100%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.package-card{
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:20px;
  text-align:center;
}

.package-card h2{
  color:#ffcc00;
  margin-bottom:8px;
}

.price{
  color:#00ff66;
  font-weight:bold;
}

/* BUTTON */
.sample-btn{
  margin-top:10px;
  padding:10px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(15px);
  display:none;
  align-items:center;
  justify-content:center;
}

/* STAGE */
.stage{
  width:100%;
  max-width:900px;
  height:500px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* VIDEO BOX */
.video-box{
  position:absolute;
  width:260px;
  height:460px;
  border-radius:25px;
  overflow:hidden;
  background:#000;
  opacity:0;
  transform:scale(0.7);
  transition:0.4s ease;
  cursor:pointer;
}

/* ACTIVE */
.video-box.active{
  opacity:1;
  transform:scale(1);
  z-index:3;
}

/* SIDE */
.video-box.prev{
  opacity:0.4;
  transform:translateX(-180px) scale(0.8);
  z-index:2;
}

.video-box.next{
  opacity:0.4;
  transform:translateX(180px) scale(0.8);
  z-index:2;
}

/* VIDEO */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CLOSE */
.close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:25px;
  cursor:pointer;
  z-index:5;
}
</style>
</head>

<body>

<h1>Social Media Management</h1>

<div class="packages">

<div class="package-card" data-type="basic">
<h2>Basic</h2>
<p>Simple viral content. iPhone shoot. 3 videos/week. No host.</p>
<p class="price">15,000 Birr</p>
<button class="sample-btn">View Samples</button>
</div>

<div class="package-card" data-type="standard">
<h2>Standard</h2>
<p>Pro camera, heavy editing, better quality. With host/model.</p>
<p class="price">28,000 Birr</p>
<button class="sample-btn">View Samples</button>
</div>

<div class="package-card" data-type="premium">
<h2>Premium</h2>
<p>Same as Standard but upgraded. Top creators, premium production.</p>
<p class="price">37,000 Birr</p>
<button class="sample-btn">View Samples</button>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">✖</div>
  <div class="stage" id="stage"></div>
</div>

<script>
const modal = document.getElementById("modal");
const stage = document.getElementById("stage");

let videos = [];
let index = 0;

// OPEN
document.querySelectorAll(".sample-btn").forEach(btn=>{
  btn.onclick = (e)=>{
    const type = e.target.closest(".package-card").dataset.type;

    videos = [];
    for(let i=1;i<=5;i++){
      videos.push(`${type} vid${i}.mp4`);
    }

    index = 0;
    build();
    modal.style.display="flex";
  }
});

// BUILD
function build(){
  stage.innerHTML="";

  videos.forEach((src,i)=>{
    const box = document.createElement("div");
    box.className="video-box";

    const vid = document.createElement("video");
    vid.src = src;
    vid.loop = true;
    vid.autoplay = true;
    vid.muted = true;

    box.appendChild(vid);

    // ✅ TAP VIDEO = MAKE ACTIVE
    box.onclick = ()=>{
      index = i;
      update();
    };

    stage.appendChild(box);
  });

  update();
}

// UPDATE
function update(){
  const boxes = document.querySelectorAll(".video-box");

  boxes.forEach((box,i)=>{
    box.className="video-box";

    if(i === index){
      box.classList.add("active");
    }
    else if(i === index - 1){
      box.classList.add("prev");
    }
    else if(i === index + 1){
      box.classList.add("next");
    }
  });
}

// SWIPE
let startX = 0;

stage.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});

stage.addEventListener("touchend",e=>{
  let diff = e.changedTouches[0].clientX - startX;

  if(diff > 50 && index > 0){
    index--;
    update();
  }
  else if(diff < -50 && index < videos.length-1){
    index++;
    update();
  }
});

// CLOSE
function closeModal(){
  modal.style.display="none";
  stage.innerHTML="";
}
</script>

</body>
</html>
